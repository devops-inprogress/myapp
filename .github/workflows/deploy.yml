name: DevSecOps Scan

on:
  push:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Trivy installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Trivy Scan ausführen
        run: |
          trivy fs . -f json > result.json

      - name: Ergebnis an n8n senden und Pipeline blocken
        run: |
          RESPONSE=$(curl -s -X POST https://rings-labeled-department-apparently.trycloudflare.com/webhook/trivy-report \
            -H "Content-Type: application/json" \
            --data @result.json)

          echo "Response: $RESPONSE"

          if [[ "$RESPONSE" == *"blocked"* ]]; then
            echo "Security issue found - failing pipeline"
            exit 1
          else
            echo "No blocking security issues"
          fi
