name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Build testen
      run: |
        echo "✅ Build erfolgreich!"
        cat index.html

    - name: Deploy simulieren
      run: |
        echo "🚀 Deployment gestartet!"
        echo "App wurde deployed!"
        echo "✅ Deployment erfolgreich!"
